<div class="admin-page-wrapper admin-dark-theme">
    <header class="admin-header">
        <div class="header-left">
            <mat-icon class="header-radio-icon">radio</mat-icon>
            <div class="header-brand">
                <span class="brand-name">ThinLine Radio</span>
                <span class="brand-version">Server Administration &nbsp;v{{ version }}</span>
            </div>
        </div>
        <div class="header-right">
            <!-- Unsaved changes indicator -->
            <div class="unsaved-badge" *ngIf="authenticated && onConfigTab && formDirty">
                <span class="unsaved-dot"></span>
                <span class="unsaved-label">Unsaved changes</span>
            </div>

            <!-- Save / Reset — Config tab only -->
            <ng-container *ngIf="authenticated && onConfigTab">
                <button type="button" mat-stroked-button class="header-action-btn header-reset-btn"
                        [disabled]="configLoading || !formDirty"
                        (click)="resetConfig()">
                    <mat-icon>undo</mat-icon>
                    <span class="btn-label">Reset</span>
                </button>
                <button type="button" mat-raised-button class="header-action-btn header-save-btn"
                        [disabled]="configLoading || !formDirty || !formValid"
                        (click)="saveConfig()">
                    <mat-icon>save</mat-icon>
                    <span class="btn-label">Save</span>
                </button>
            </ng-container>

            <span class="header-badge">
                <mat-icon>admin_panel_settings</mat-icon>
                Admin Console
            </span>
            <button
                *ngIf="authenticated"
                mat-stroked-button
                class="header-logout-btn"
                (click)="logout()">
                <mat-icon>logout</mat-icon>
                <span class="logout-label">Logout</span>
            </button>
        </div>
    </header>
    <main class="admin-body">
        <rdio-scanner-admin #adminComponent></rdio-scanner-admin>
    </main>
</div>
